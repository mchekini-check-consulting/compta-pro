<!-- Les 3 icones de navigation, a droite du badge de statut (AC-02 / RG-002) -->
<span class="dossier-nav" role="group" aria-label="Sections du dossier">
  @for (section of sections; track section.key) {
    <button
      type="button"
      class="dossier-nav__btn"
      [class.dossier-nav__btn--active]="isActive(section.key)"
      [class.dossier-nav__btn--disabled]="isDisabled(section.key)"
      [attr.data-section]="section.key"
      [attr.aria-label]="section.label"
      [attr.aria-expanded]="isActive(section.key)"
      [attr.aria-disabled]="isDisabled(section.key)"
      (click)="onActivate($event, section.key)"
    >
      <svg
        class="dossier-nav__icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        @switch (section.icon) {
          @case ('building') {
            <path d="M3 21h18" />
            <path d="M5 21V5a2 2 0 012-2h6a2 2 0 012 2v16" />
            <path d="M15 21V9h2a2 2 0 012 2v10" />
            <path d="M8 7h2M8 11h2M8 15h2" />
          }
          @case ('calculator') {
            <rect x="4" y="2" width="16" height="20" rx="2" />
            <path d="M8 6h8" />
            <path d="M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01" />
          }
          @case ('users') {
            <circle cx="9" cy="7" r="4" />
            <path d="M3 21a6 6 0 0112 0" />
            <path d="M16 3.5a4 4 0 010 7" />
            <path d="M21 21a6 6 0 00-5-5.9" />
          }
        }
      </svg>
      <!-- Infobulle au survol apres 300 ms (AC-04 / RG-003 / AC-13) -->
      <span class="dossier-nav__tooltip" role="tooltip">{{ tooltip(section) }}</span>
    </button>
  }
</span>
