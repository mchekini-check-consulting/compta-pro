<aside class="sidebar">
  <nav class="sidebar__nav">
    @for (group of menuGroups; track group.title) {
      <div class="sidebar__group">
        <h3 class="sidebar__group-title">{{ group.title }}</h3>
        <div class="sidebar__group-items">
          @for (item of group.items; track item.route) {
            <a
              [routerLink]="item.route"
              routerLinkActive="sidebar__item--active"
              class="sidebar__item"
              [attr.data-accent]="item.accent || 'blue'"
              [attr.aria-label]="item.ariaLabel || item.label"
            >
              <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                @switch (item.icon) {
                  @case ('dashboard') {
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                  }
                  @case ('folder') {
                    <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                  }
                  @case ('tasks') {
                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" />
                    <rect x="9" y="3" width="6" height="4" rx="1" />
                    <path d="M9 14l2 2 4-4" />
                  }
                  @case ('checkbox') {
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <path d="M8 12l3 3 5-6" />
                  }
                  @case ('checklist') {
                    <path d="M9 6h11M9 12h11M9 18h11" />
                    <path d="M4 6l1 1 2-2M4 12l1 1 2-2M4 18l1 1 2-2" />
                  }
                  @case ('people') {
                    <circle cx="9" cy="8" r="3.5" />
                    <path d="M3 20a6 6 0 0112 0" />
                    <path d="M16 5.5a3.5 3.5 0 010 6.8M17 20a6 6 0 00-2-4.4" />
                  }
                  @case ('calendar') {
                    <rect x="3" y="4" width="18" height="18" rx="2" />
                    <path d="M16 2v4M8 2v4M3 10h18" />
                    <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01" />
                  }
                  @case ('invoice') {
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                    <path d="M14 2v6h6" />
                    <path d="M8 13h8M8 17h5" />
                  }
                  @case ('library') {
                    <path d="M4 19.5A2.5 2.5 0 016.5 17H20" />
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" />
                    <path d="M8 7h8M8 11h6" />
                  }
                  @case ('team') {
                    <circle cx="12" cy="7" r="4" />
                    <path d="M5.5 21a6.5 6.5 0 0113 0" />
                  }
                }
              </svg>
              <span class="sidebar__label">{{ item.label }}</span>
              @if (item.badge && item.badge() > 0) {
                <span class="sidebar__badge">{{ item.badge() }}</span>
              }
            </a>
          }
        </div>
      </div>
    }
  </nav>
</aside>
